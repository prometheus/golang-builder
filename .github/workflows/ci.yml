---
name: CI
on:
  push:
    branches: [master, 'release-*']
    tags: ['v*']
  pull_request:
    paths:
      - "go.sum"
      - "go.mod"
      - "**.go"
      - "*/Makefile.COMMON"
      - "*/base/*"
      - "*/main/*"
      - ".github/workflows/ci.yml"

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  unit-tests:
    permissions:
      contents: read  # for actions/checkout to fetch code
      pull-requests: read  # for golangci/golangci-lint-action to fetch pull requests
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: make --always-make test-unit

  extract-macos-sdk:
    name: Extract macOS SDK
    runs-on: macos-15
    outputs:
      sdk_version: ${{ steps.sdk.outputs.sdk_version }}
    steps:
      - name: Extract SDK files
        id: sdk
        run: |
          SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version)"
          echo "sdk_version=${SDK_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Using SDK at ${SDKROOT} (version ${SDK_VERSION})"

          mkdir -p sdk-files/Frameworks

          cp -r "${SDKROOT}/usr/include" sdk-files/include
          cp -r "${SDKROOT}/usr/lib" sdk-files/lib

          for fw in CoreFoundation Foundation IOKit Security; do
            cp -r "${SDKROOT}/System/Library/Frameworks/${fw}.framework" "sdk-files/Frameworks/${fw}.framework"
          done

      - name: Upload SDK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-sdk
          path: sdk-files/
          retention-days: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [extract-macos-sdk]
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: prometheus/promci-setup@5af30ba8c199a91d6c04ebdc3c48e630e355f62d # v0.1.0
        with:
          clean-runner-disk: true
          enable_go: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}.x
      - run: make VARIANTS=base VERSION=${{ matrix.go }}
      - name: Download macOS SDK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-sdk
          path: ${{ matrix.go }}/main/macos-sdk/
      - run: make VARIANTS=main VERSION=${{ matrix.go }}
      - run: docker images
      - run: ls -l docker-images
      - uses: prometheus/promci-artifacts/save@f9a587dbc0b2c78a0c54f8ad1cde71ea29a4b76f # v0.1.0
        with:
          directory: docker-images

  publish_master:
    name: Publish master branch artifacts
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    if: |
      (github.event_name == 'push' && github.event.ref == 'refs/heads/main')
      ||
      (github.event_name == 'push' && github.event.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: prometheus/promci-artifacts/restore@f9a587dbc0b2c78a0c54f8ad1cde71ea29a4b76f # v0.1.0
      - name: Load images
        run: |
          for image in docker-images/* ; do
            docker image load --input "${image}"
          done
      - run: docker images
      - run: make tag
      - name: Login to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: ${{ secrets.quay_io_login }}
          password: ${{ secrets.quay_io_password }}
      - run: make push
